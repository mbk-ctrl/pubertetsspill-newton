<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Pubertet – Flashcardspill</title>
<style>
body {
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#game {
    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    text-align:center;
}
button {
    width:100%;
    padding:12px;
    margin:6px 0;
    font-size:16px;
    cursor:pointer;
}
.correct { background:#4CAF50; color:white; }
.wrong { background:#F44336; color:white; }
</style>
</head>

<body>

<div id="game">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <p id="feedback"></p>
    <p id="score">Poeng: 0</p>
</div>

<script>
const cards = [
 {q:"Hva kalles perioden der kroppen forandrer seg?", a:["Pubertet","Barndom"], c:0},
 {q:"Hvilke hormoner starter puberteten?", a:["Kjønnshormoner","Vitaminer"], c:0},
 {q:"Hva skjer ofte hos jenter i puberteten?", a:["Brystene vokser","Stemmen blir lysere"], c:0},
 {q:"Hva skjer ofte hos gutter i puberteten?", a:["Stemmen blir dypere","Menstruasjon starter"], c:0}
];

let i = 0;
let score = 0;

function loadCard() {
  document.getElementById("feedback").textContent = "";
  document.getElementById("question").textContent = cards[i].q;
  const answers = document.getElementById("answers");
  answers.innerHTML = "";
  cards[i].a.forEach((text, index) => {
    const btn = document.createElement("button");
    btn.textContent = text;
    btn.onclick = () => checkAnswer(btn, index);
    answers.appendChild(btn);
  });
}

function checkAnswer(button, choice) {
  const correct = cards[i].c;
  const buttons = document.querySelectorAll("button");
  buttons.forEach(b => b.disabled = true);

  if (choice === correct) {
    button.classList.add("correct");
    document.getElementById("feedback").textContent = "Bra jobbet!";
    score++;
    setTimeout(() => {
      i++;
      if (i < cards.length) {
        loadCard();
      } else {
        document.getElementById("question").textContent = "Ferdig 🎉";
        document.getElementById("answers").innerHTML = "";
      }
      document.getElementById("score").textContent = "Poeng: " + score;
    }, 800);
  } else {
    button.classList.add("wrong");
    buttons[correct].classList.add("correct");
    document.getElementById("feedback").textContent = "Prøv igjen";
    setTimeout(loadCard, 1000);
  }
}

loadCard();
</script>

</body>
</html>
