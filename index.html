<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pubertet – Flashcardspill</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#game {
    background:white;
    padding:30px;
    width:420px;
    max-width:90%;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

button {
    width:100%;
    padding:14px;
    margin:8px 0;
    font-size:16px;
    cursor:pointer;
    border:none;
    border-radius:6px;
    background:#dddddd;
}

.correct { background:#4CAF50; color:white; }
.wrong   { background:#F44336; color:white; }

#feedback { font-weight:bold; min-height:24px; margin-top:10px; }
#score { margin-top:10px; }

#restartBtn {
    display:none;
    background:#2196F3;
    color:white;
}

.symbol {
    font-size:40px;
}
</style>
</head>

<body>

</div>
