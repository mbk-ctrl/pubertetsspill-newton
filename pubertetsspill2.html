<!DOCTYPE html>

<title>Pubertet – Flashcards</title>
<style>
    body {

        background: #f4f6f8;

        justify-content: center;

        height: 100vh;
    }
    #game {
        background: white;
        padding: 30px;
        width: 500px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        text-align: center;
    }
    .question {
        font-size: 20px;
        margin-bottom: 20px;
    }
    .answers button {
        display: block;
        width: 100%;
        margin: 8px 0;
        padding: 12px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #ddd;
    }
    .answers button.correct {
        background: #4CAF50;
        color: white;
    }
    .answers button.wrong {
        background: #F44336;
        color: white;
    }
    #feedback {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
    }
    #score {
        margin-top: 10px;
        font-size: 16px;
    }
</style>
</head>
